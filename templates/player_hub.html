<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ app_title }} — {{ player }}</title>
<style>
:root {
  --bg: #0f1118; --panel: #171a24; --panel-2: #1e2230; --border: #2a2f40;
  --text: #e8eaf2; --muted: #9aa0b5; --accent: #7c6cf0; --win: #3fb68b; --loss: #e05563;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 48px 24px; }
h1 { font-size: 28px; color: var(--accent); margin-bottom: 8px; }
.sub { color: var(--muted); margin-bottom: 28px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
select, .btn { width: 100%; font: inherit; border-radius: 8px; border: 1px solid var(--border); padding: 12px 14px; }
select { background: var(--panel-2); color: var(--text); margin-bottom: 14px; }
.btn { display: inline-block; text-align: center; background: var(--accent); color: #fff; text-decoration: none; font-weight: 600; }
.btn:hover { filter: brightness(1.08); }
.links { margin-top: 20px; font-size: 14px; }
.links a { color: var(--accent); text-decoration: none; }
.links a:hover { text-decoration: underline; }
footer { color: var(--muted); font-size: 13px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<h1>{{ player }}</h1>
<p class="sub">Choose a champion and lane to open its pre-generated coaching report.</p>

<div class="panel">
  <label for="build-select">Your builds (20+ solo/duo games)</label>
  <select id="build-select" onchange="if (this.value) window.location = this.value">
    {% for build in builds %}
    <option value="{{ build.href }}"{% if build.href == default_href %} selected{% endif %}>
      {{ build.build_label }} · {{ build.games }}g · {{ '%.0f' % (build.winrate * 100) }}% WR
    </option>
    {% endfor %}
  </select>
  <a class="btn" href="{{ default_href }}">Open most-played report</a>
</div>

<p class="links"><a href="../../index.html">← All players</a></p>
<footer>Updated {{ generated_at }}</footer>
</body>
</html>
